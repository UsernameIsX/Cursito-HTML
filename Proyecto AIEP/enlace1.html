<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Página con Enlace</title>
    <style>
    body {
        background-color: #b1d5ec;
        font-family: Arial, sans-serif;
        text-align: center;
        padding-top: 100px;
    }
    a {
        text-decoration: none;
        color: white;
        background-color: #1976d1;
        padding: 15px 25px;
        border-radius: 8px;
        font-size: 18px;
        transition: background-color 0.3s ease;
    }
    a:hover {
      background-color: #0d47a1; /* Azul más oscuro al pasar el mouse */
    }
    </style>
    </head>
    <body>
        <a href="https://www.youtube.com/shorts/Tp3HcluW0bQ">Visualiza Video de Agencia</a>
    </body>
</html>
