<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agencia Digital GC</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
    <h1>Agencia Digital GC</h1>
    <ul>
        <li><a href="#servicios">Servicio</a></li>
    </ul>
    </header>
    <section id="hero">
    <h2>Transformamos las ideas en experiencia digital</h2>
    <p>Diseño, marketing digital y soluciones inovadoras para ti.</p>
    </section>
    <section id="servicios">
    <h2>Servicios</h2>
    <div class="cards">
        <div class="card"><a href="enlace1.html" title="Este enlace lleva a youtube">Diseño</a></div>
        <div class="card"><a href="enlace2.html" title="Este enlace lleva a youtube">marketing</a></div>
        <div class="card"><a href="enlace3.html" title="Este enlace lleva a una Imagen">Crear</a></div>
    </div>
    </section>
    <section id="proyecto">
    <h2>Portafio</h2>
    </section>
    <section id="contacto">
    <h2>Contacto</h2>
    <form id="contact-form">
        <div>
            <label for="nombre">Nombre Completo:</label>
            <input type="text" id="nombre" name="nombre" required>
            <span id="error-nombre" class="error-message"></span>
        </div>
        <div>
            <label for="correo">Correo Electronico:</label>
            <input type="email" id="correo" name="correo" required>
            <span id="error-correo" class="error-message"></span>
        </div>
        <div>
            <label for="mensaje">Mensaje Obligatorio:</label>
            <textarea id="mensaje" name="mensaje" required></textarea>
            <span id="error-mensaje" class="error-message"></span>
        </div>
        <button type="submit">Enviar</button>
        <div id="status-message"></div>
    </form>
    <p id="respuesta"></p>
    </section>
    <footer>
    <p>Agencia Gastón Castillo 2026</p>
    </footer>
</body>
</html>
